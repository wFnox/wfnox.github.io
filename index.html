<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LernWeb</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
  <script>
    // Apply saved theme before first paint to prevent flash
    (function () {
      const t = localStorage.getItem('theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="logo" onclick="navigate('')">LernWeb</span>
      <nav id="breadcrumb"></nav>
      <div class="search-wrap" id="search-wrap">
        <input type="search" id="search-input" class="search-input"
          placeholder="Suchen…" autocomplete="off"
          aria-label="Inhalte suchen" aria-haspopup="listbox"
          aria-expanded="false" role="combobox" />
        <ul class="search-results" id="search-results" role="listbox" aria-label="Suchergebnisse"></ul>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Farbschema wechseln" onclick="toggleTheme()"></button>
    </div>
  </header>

  <main id="app">
    <div class="spinner">Laden…</div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
